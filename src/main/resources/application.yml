spring:
  application:
    name: course-service
  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:changeme}
  datasource:
    url: ${DATASOURCE_URL:jdbc:mysql://localhost:3306/edtech_course_service?useSSL=false}
    username: ${DATASOURCE_USERNAME:root}
    password: ${DATASOURCE_PASSWORD:changeme}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
course:
  user-service:
    authorization-token: ${USER_SERVICE_AUTH_TOKEN:}
server:
  port: 8081
resilience4j:
  circuitbreaker:
    instances:
      courseEnrollment:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      courseEnrollment:
        max-attempts: 3
        wait-duration: 500

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

spring:
  sleuth:
    sampler:
      probability: 1.0
